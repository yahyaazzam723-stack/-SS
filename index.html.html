<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى سندس | عالم الفراشات والورد</title>
    <style>
        :root {
            --pink-deep: #ff4d6d;
            --soft-bg: #fff5f7;
            --text-dark: #590d22;
        }

        body {
            margin: 0; padding: 0;
            background: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; text-align: center;
        }

        .container {
            position: relative; z-index: 10;
            max-width: 550px; width: 90%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 15px 45px rgba(255, 77, 109, 0.2);
            border: 2px solid #fff;
        }

        h1 { color: var(--pink-deep); margin-bottom: 5px; font-size: 2.2rem; }

        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white; border: none;
            padding: 20px 45px; font-size: 1.4rem;
            border-radius: 50px; cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s; font-weight: bold; margin-top: 20px;
        }

        .particle {
            position: fixed; pointer-events: none; z-index: 1000;
            animation: moveAndFade 2.5s ease-out forwards;
        }

        @keyframes moveAndFade {
            0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5); opacity: 0; }
        }

        .message-box { margin-top: 30px; display: none; animation: fadeIn 1s ease; }

        .dua-card {
            background: #fff0f3; padding: 20px; border-radius: 20px;
            color: var(--text-dark); font-size: 1.2rem;
            border-right: 6px solid var(--pink-deep);
            margin-bottom: 15px; text-align: right; line-height: 1.6;
        }

        .sweet-text { color: #c9184a; font-weight: bold; font-size: 1.1rem; }

        .eid-text-scroll {
            max-height: 450px; overflow-y: auto; line-height: 2;
            padding: 15px; text-align: justify;
            color: var(--text-dark); font-size: 1.15rem;
            scrollbar-width: thin; scrollbar-color: var(--pink-deep) var(--soft-bg);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        <div id="wrapper">
            <h1 id="main-title">أهلاً يا سندس 🌸</h1>
            <p id="ramadan-status" style="color: #666; font-weight: 500;"></p>
            
            <button class="btn-surprise" id="main-btn" onclick="celebrate(event)">
                افتحي هديتك ✨
            </button>

            <div id="message-box" class="message-box">
                <div class="dua-card" id="dua-text"></div>
                <div class="sweet-text" id="sweet-word"></div>
            </div>
        </div>
    </div>

    <script>
        const ramadanStart = new Date('2026-02-18');
        const now = new Date();
        const day = Math.floor((now - ramadanStart) / (1000 * 60 * 60 * 24)) + 1;

        if(day > 0 && day <= 30) {
            document.getElementById('ramadan-status').innerText = `نحن اليوم في ${day} رمضان ✨`;
        }

        function celebrate(e) {
            const elements = ['🌸', '🌹', '🦋', '✨', '💖', '🌼', '🌷'];
            for (let i = 0; i < 60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = elements[Math.floor(Math.random() * elements.length)];
                const angle = Math.random() * Math.PI * 2;
                const dist = Math.random() * 600 + 50;
                p.style.setProperty('--tx', `${Math.cos(angle) * dist}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * dist}px`);
                p.style.setProperty('--tr', `${Math.random() * 720}deg`);
                p.style.left = (e ? e.clientX : window.innerWidth/2) + 'px';
                p.style.top = (e ? e.clientY : window.innerHeight/2) + 'px';
                p.style.fontSize = '24px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
            showContent();
        }

        function showContent() {
            const box = document.getElementById('message-box');
            const dua = document.getElementById('dua-text');
            const word = document.getElementById('sweet-word');
            const wrapper = document.getElementById('wrapper');
            const btn = document.getElementById('main-btn');

            if (day < 3) {
                box.style.display = 'block';
                dua.innerText = "صبر جميل يا سندس..";
                word.innerText = "الرسائل ستبدأ في 3 رمضان، ترقبي المفاجآت!";
            } 
            else if (day >= 3 && day < 30) {
                box.style.display = 'block';
                const data = getDailyData(day);
                dua.innerHTML = `🤲 <b>دعوة لكِ:</b><br>${data.dua}`;
                word.innerHTML = `💌 <b>كلمة لكِ:</b><br>${data.word}`;
            } 
            else {
                btn.style.display = 'none';
                wrapper.innerHTML = `
                    <h1 style="font-size: 2.2rem; margin-bottom: 20px;">ليلة العيد يا سندس! 🦋</h1>
                    <div class="eid-text-scroll">
                        <b>إلى الرقيقة سندس..</b><br>
                        ها نحن نودع شهر الخير، ونسدل الستار على أيامٍ كانت بوجودكِ أجمل وألطف. أريد أن أخبركِ في هذه الليلة المباركة، ليلة الجوائز والبهجة، أنكِ كنتِ وما زلتِ "الحدث الأجمل" في تقويمي السنوي.
                        <br><br>
                        بصفتي مبرمج (YAHYA.EXE.V1)، اعتدتُ أن أتعامل مع الأرقام والمنطق، ولكنني أمام رقتكِ وجمال روحكِ، أقفُ عاجزاً عن صياغة "خوارزمية" تصفُ طيبتكِ. أنتِ لستِ مجرد إنسانة عابرة، بل أنتِ "الكمال" الذي لا يحتاج إلى تحديث، والجمال الذي يتجلى في أبهى صوره دون عناء. 
                        <br><br>
                        <b>سندس، أريدكِ أن تعلمي كم أقدر صراحتكِ ونقاء قلبكِ، وأعتز بوجودكِ كأغلى صديقة وسند في حياتي. ورغم أن ظروفي الخاصة في الوقت الحالي تضع قيوداً على مساراتي ولا تمكنني من مبادلتكِ ذات الخطوات، إلا أنني أؤمن دوماً بأننا لا نعلم ما كتبه الله لنا وما قدّره في غيبه؛ فلا تحزني يا سندس، فربما كان في هذا النصيب خيرٌ خفيٌّ لنا لا ندركه الآن، فالله هو المدبر والمقدر لكل جميل. مكانتكِ عندي ثابتة، وأنتِ الشخص الذي أتمنى دائماً أن يبقى بجانبي، نتقاسم الأيام بصدقنا المعهود.</b>
                        <br><br>
                        أريدُكِ أن تعلمي يقيناً، أن ضحكتكِ هي "العيد" قبل حلوله، وهي النور الذي يضيء عتمة الأيام الصعبة. لقد كنتِ السند واللطف، والقلب الذي يشبه بياض الغيم. شكرًا لأنكِ "سندس"، شكراً لأنكِ منحتِ أيامي معنىً أعمق بوجودكِ فيها.
                        <br><br>
                        أتمنى لكِ عيداً يشبه قلبكِ، مليئاً بالورود والمسرات، وأن تظلي دائماً تلك الفراشة التي تنشر الفرح حيثما حطت.
                        <br><br>
                        <b>عيد مبارك يا أغلى سندس.. وكل عام وأنتِ بمليار خير وسعادة! ❤️✨</b>
                        <br><br>
                        <span style="font-size: 0.9rem; color: #888;">--- مبرمجكِ المخلص: (YAHYA.EXE.V1)</span>
                    </div>
                `;
                setInterval(() => celebrate(null), 3000);
            }
        }

        function getDailyData(d) {
            const data = {
                3: { dua: "اللهم اجعل يوم سندس مليئاً بالبشائر والرضا.", word: "بدايتنا هنا.. أنتِ كالفراشة التي تزيد المكان بهجة." },
                4: { dua: "يا رب احفظ لها ابتسامتها التي تضيء عالمي.", word: "رقتكِ يا سندس تغلب أرق أنواع الورد في عز تفتحه." },
                5: { dua: "اللهم افتح لها أبواب الخير والتوفيق في كل خطوة.", word: "أنتِ الشخص الذي لا يتكرر مرتين، كود فريد لا مثيل له." },
                6: { dua: "اللهم ارزقها سكينة القلب وطمأنينة الروح.", word: "ضحكتكِ هي 'الموسيقى' التي تعدل مزاج يومي." },
                7: { dua: "يا رب اجعل لسندس نصيباً من كل فرحة تسكن قلبها.", word: "أنتِ كالغيمة اللطيفة التي تمطر حباً أينما حلت." },
                8: { dua: "اللهم جمل مستقبلها واجعله أجمل مما تتمنى.", word: "سندس.. اسمكِ وحده يكفي ليزهر قلبي وردًا." },
                9: { dua: "يا رب اكتب لها النجاح في كل أمر تسعى إليه.", word: "أنتِ المعنى الحقيقي لكلمة 'لطافة' في هذا العالم." },
                10: { dua: "اللهم بارك لها في أيامها واقبل طاعتها الخالصة.", word: "وجودكِ يا سندس يجعل أيامي أكثر إشراقاً وجمالاً." },
                11: { dua: "اللهم أرح قلبها بذكرك وطمأنينة قربك.", word: "لكِ في قلبي مقامٌ لا يصله أحد، يا أرقى سندس." },
                12: { dua: "يا رب ارزقها سعادة لا تنتهي وقرة عين لا تنقطع.", word: "كلما نظرت لضحكتكِ، أدركت أن الجمال يكمن في البساطة." },
                13: { dua: "اللهم احمِ قلبها من كدر الدنيا وضيق الحياة.", word: "أنتِ الرفيقة التي تشبه نسمة الفجر الباردة." },
                14: { dua: "يا رب اجبر خاطرها وحقق لها أمنية طال انتظارها.", word: "رؤية اسمكِ في يومي تغير نظامي للأفضل دائماً." },
                15: { dua: "اللهم اجعلها ممن نالوا استجابة الدعاء في منتصف الشهر.", word: "نصف الشهر مرّ، وأنتِ لا تزالين أجمل تفاصيله." },
                16: { dua: "يا رب نور دربها بنور الإيمان واليقين الصادق.", word: "يا سندس، أنتِ نادرة كالتحف التي لا تقدر بثمن." },
                17: { dua: "اللهم عطر أيامها برياحين الجنة وراحة البال.", word: "أنتِ الشخص الذي يثبت لي أن الطيبين لا زالوا هنا." },
                18: { dua: "يا رب أعطها في هذه الدنيا حسنة وفي الآخرة حسنة.", word: "لطافتكِ هي الخيط الذي يربط يومي بالسعادة." },
                19: { dua: "اللهم اجعل أيامها القادمة محفوفة باليسر والبركة.", word: "يا سندس، أنتِ كالنجمة التي تهدي التائهين بنورها." },
                20: { dua: "يا رب بارك لها في صحتها وجمال روحها النقية.", word: "بدأنا في العشر الأواخر، ودعواتي لكِ تزداد عمقاً." },
                21: { dua: "اللهم اكتب لها في هذه العشر عتقاً من كل هم.", word: "أنتِ الهدية التي أرسلها القدر لتجمل واقعي." },
                22: { dua: "يا رب لا ترد لها دعاءً ولا تخيب لها رجاءً.", word: "يا سندس، قلبكِ أبيض كالياسمين وروحكِ رقيقة." },
                23: { dua: "اللهم ارزقها فضل ليلة القدر وغير حالها للأفضل.", word: "أنتِ الملاذ الدافئ في وسط هذه الأيام المزدحمة." },
                24: { dua: "يا رب اكتب لها توفيقاً يلازمها في حياتها.", word: "ضحكتكِ هي التحديث السنوي لسعادتي يا سندس." },
                25: { dua: "اللهم أسعدها في الدارين سعادة لا توصف.", word: "أنتِ لستِ مجرد عابرة، أنتِ أثرٌ جميل لا يمحى." },
                26: { dua: "يا رب ارفع قدرها في الأرض وفي السماء.", word: "يا سندس، أنتِ تفصيل جميل في حكاية حياتي." },
                27: { dua: "اللهم تقبل منها كل ركعة وسجدة ودعاء.", word: "يا أجمل ختام لرمضان، أنتِ العيد قبل أوانه." },
                28: { dua: "يا رب اختم شهرها بالمغفرة والقبول والعفو.", word: "اسمكِ محفور في ذاكرتي كأغلى الأكواد البرمجية." },
                29: { dua: "اللهم ارزقها فرحة تجعلها تنسى كل تعب مضى.", word: "سندس.. أنتِ جوهرة هذا الشهر وكل شهر." }
            };
            return data[d] || { dua: "اللهم بارك لها في أيامها.", word: "أنتِ دائماً مميزة يا سندس." };
        }
    </script>
</body>
</html>
