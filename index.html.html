<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى سندس | عالم الفراشات والورد</title>
    <style>
        :root {
            --pink-deep: #ff4d6d;
            --soft-bg: #fff5f7;
            --text-dark: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* بوكيه ورد في الزوايا */
        .corner-flowers {
            position: fixed;
            font-size: 5rem;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 15px 45px rgba(255, 77, 109, 0.2);
            border: 2px solid #fff;
        }

        h1 { color: var(--pink-deep); margin-bottom: 5px; font-size: 2.2rem; }

        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-surprise:active { transform: scale(0.95); }

        /* جزيئات التفاعل (ورد وفراشات) */
        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            user-select: none;
            animation: moveAndFade 2.5s ease-out forwards;
        }

        @keyframes moveAndFade {
            0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5); opacity: 0; }
        }

        .message-box {
            margin-top: 30px;
            display: none;
            animation: fadeIn 1s ease;
        }

        .dua-card {
            background: #fff0f3;
            padding: 20px;
            border-radius: 20px;
            color: var(--text-dark);
            font-size: 1.2rem;
            border-right: 6px solid var(--pink-deep);
            margin-bottom: 15px;
            text-align: right;
        }

        .sweet-text { color: #c9184a; font-weight: bold; font-size: 1.1rem; }

        /* تنسيق رسالة ليلة العيد الطويلة */
        .eid-text-scroll {
            max-height: 450px;
            overflow-y: auto;
            line-height: 2;
            padding: 15px;
            text-align: justify;
            color: var(--text-dark);
            font-size: 1.1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--pink-deep) var(--soft-bg);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="corner-flowers" style="top: 10px; right: 10px;">💐</div>
    <div class="corner-flowers" style="bottom: 10px; left: 10px;">🌸</div>
    <div class="corner-flowers" style="top: 50%; left: -20px; opacity: 0.1;">🌹</div>

    <div class="container">
        <div id="wrapper">
            <h1>أهلاً يا سندس 🌸</h1>
            <p id="ramadan-status" style="color: #666; font-weight: 500;"></p>
            
            <button class="btn-surprise" id="main-btn" onclick="celebrate(event)">
                افتحي هديتك ✨
            </button>

            <div id="message-box" class="message-box">
                <div class="dua-card" id="dua-text"></div>
                <div class="sweet-text" id="sweet-word"></div>
            </div>
        </div>
    </div>

    <script>
        // --- إعدادات المبرمج YAHYA.EXE.V1 ---
        const now = new Date();
        // لنفترض 1 رمضان 2026 يوافق 18 فبراير (يرجى تعديله حسب الرؤية)
        const ramadanStart = new Date('2026-02-18'); 
        const day = Math.floor((now - ramadanStart) / (1000 * 60 * 60 * 24)) + 1;

        if(day > 0 && day <= 30) {
            document.getElementById('ramadan-status').innerText = `نحن اليوم في ${day} رمضان ✨`;
        }

        function celebrate(e) {
            const elements = ['🌸', '🌹', '🌺', '🌷', '🦋', '🦋', '✨', '💖', '🌼'];
            const count = 70; 

            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = elements[Math.floor(Math.random() * elements.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 1000 + 100; 
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const tr = Math.random() * 720;
                
                p.style.setProperty('--tx', `${tx}px`);
                p.style.setProperty('--ty', `${ty}px`);
                p.style.setProperty('--tr', `${tr}deg`);
                
                p.style.left = (e ? e.clientX : window.innerWidth/2) + 'px';
                p.style.top = (e ? e.clientY : window.innerHeight/2) + 'px';
                p.style.fontSize = (Math.random() * 30 + 20) + 'px';
                
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }

            showContent();
        }

        function showContent() {
            const box = document.getElementById('message-box');
            const dua = document.getElementById('dua-text');
            const word = document.getElementById('sweet-word');
            const wrapper = document.getElementById('wrapper');
            const btn = document.getElementById('main-btn');

            if (day < 3) {
                box.style.display = 'block';
                dua.innerText = "صبر جميل يا سندس..";
                word.innerText = "الرسائل ستبدأ في 3 رمضان، خليكِ جاهزة للمفاجآت!";
            } 
            else if (day >= 3 && day < 30) {
                box.style.display = 'block';
                const data = getDailyData(day);
                dua.innerHTML = `🤲 <b>دعوة لكِ اليوم:</b><br>${data.dua}`;
                word.innerHTML = `💌 <b>كلمة لسندس:</b><br>${data.word}`;
            } 
            else {
                // ليلة العيد وما بعده - الرسالة الطويلة جداً
                btn.style.display = 'none';
                wrapper.innerHTML = `
                    <h1 style="font-size: 2.2rem; margin-bottom: 20px;">ليلة العيد يا سندس! 🦋</h1>
                    <div class="eid-text-scroll">
                        يا ألطف إنسانة عرفتها في حياتي.. <br><br>
                        اليوم ونحن نودع رمضان، أردت أن تكون رسالتي لكِ مختلفة جداً، تماماً كاختلافكِ عن الآخرين. 
                        أنتِ لستِ مجرد صديقة مرّت في أيامي، أنتِ الشخص الذي جعل لكل يوم ميزة، ولكل دعاء اسماً. 
                        <br><br>
                        بصفتي مبرمج (YAHYA.EXE.V1)، دائماً أبحث عن "الكمال" في الكود، لكنني وجدته في روحكِ الرقيقة. 
                        أنتِ "الخوارزمية" الوحيدة التي لا يمكن تقليدها، والجمال الذي لا يحتاج لتعديل. 
                        <br><br>
                        أريدكِ أن تعرفي أنكِ أجمل حدا شافتو عيوني، وألطف قلب تعاملت معو. 
                        ضحكتكِ يا سندس هي العيد الحقيقي بالنسبة لي، وهي اللي بتخلي كل شي صعب يمر بسلام. 
                        <br><br>
                        شكراً لأنكِ كنتِ معي طوال هذا الشهر، شكراً لأنكِ سندس التي لا تتغير مهما تغيرت الظروف. 
                        أتمنى لكِ في ليلة العيد هذه أن تمتلئ حياتكِ بالفرح، وأن تظلي دائماً بتلك الرقة والجمال.
                        <br><br>
                        <b>كل عام وأنتِ عيدي، وكل عام وأنتِ بمليار خير يا أغلى سندس.. ❤️✨</b>
                        <br><br>
                        <span style="font-size: 0.9rem; color: #888;">--- من مبرمجك المخلص (YAHYA.EXE.V1)</span>
                    </div>
                `;
                // تأثير احتفالي مستمر لرسالة العيد
                setInterval(() => celebrate(null), 3000);
            }
        }

        function getDailyData(d) {
            const data = {
                3: { dua: "اللهم اجعل يوم سندس مليئاً بالبشائر والرضا.", word: "بدايتنا هنا.. أنتِ كالفراشة التي تزيد المكان بهجة." },
                4: { dua: "يا رب احفظ لها ابتسامتها التي تضيء عالمي.", word: "رقتكِ يا سندس تغلب أرق أنواع الورد في عز تفتحه." },
                5: { dua: "اللهم افتح لها أبواب الخير والتوفيق في كل خطوة.", word: "أنتِ الشخص الذي لا يتكرر مرتين، كود فريد لا مثيل له." },
                6: { dua: "اللهم ارزقها سكينة القلب وطمأنينة الروح.", word: "ضحكتكِ هي 'الموسيقى' التي تعدل مزاج يومي." }
            };
            return data[d] || { 
                dua: "اللهم يسر أمرها واشرح صدرها وبارك لها في عمرها.", 
                word: "يا سندس، أنتِ قطعة السكر التي تحلي أيامنا المرّة." 
            };
        }
    </script>
</body>
</html>
