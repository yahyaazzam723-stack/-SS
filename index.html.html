<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى سندس | عالم الفراشات والورد</title>
    <style>
        :root {
            --pink-deep: #ff4d6d;
            --soft-bg: #fff5f7;
            --text-dark: #590d22;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--soft-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        .corner-flowers {
            position: fixed;
            font-size: 5rem;
            z-index: 1;
            opacity: 0.3;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 10;
            max-width: 500px;
            width: 90%;
            padding: 40px 25px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            box-shadow: 0 15px 45px rgba(255, 77, 109, 0.2);
            border: 2px solid #fff;
        }

        h1 { color: var(--pink-deep); margin-bottom: 5px; font-size: 2.2rem; }

        .btn-surprise {
            background: linear-gradient(45deg, #ff4d6d, #ff85a1);
            color: white;
            border: none;
            padding: 20px 45px;
            font-size: 1.4rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 77, 109, 0.4);
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: bold;
            margin-top: 20px;
        }

        .btn-surprise:active { transform: scale(0.95); }

        .particle {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            user-select: none;
            animation: moveAndFade 2.5s ease-out forwards;
        }

        @keyframes moveAndFade {
            0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 1; }
            100% { transform: translate(var(--tx), var(--ty)) rotate(var(--tr)) scale(1.5); opacity: 0; }
        }

        .message-box {
            margin-top: 30px;
            display: none;
            animation: fadeIn 1s ease;
        }

        .dua-card {
            background: #fff0f3;
            padding: 20px;
            border-radius: 20px;
            color: var(--text-dark);
            font-size: 1.2rem;
            border-right: 6px solid var(--pink-deep);
            margin-bottom: 15px;
            text-align: right;
        }

        .sweet-text { color: #c9184a; font-weight: bold; font-size: 1.1rem; }

        .eid-text-scroll {
            max-height: 450px;
            overflow-y: auto;
            line-height: 2;
            padding: 15px;
            text-align: justify;
            color: var(--text-dark);
            font-size: 1.1rem;
            scrollbar-width: thin;
            scrollbar-color: var(--pink-deep) var(--soft-bg);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="corner-flowers" style="top: 10px; right: 10px;">💐</div>
    <div class="corner-flowers" style="bottom: 10px; left: 10px;">🌸</div>

    <div class="container">
        <div id="wrapper">
            <h1>أهلاً يا سندس 🌸</h1>
            <p id="ramadan-status" style="color: #666; font-weight: 500;"></p>
            
            <button class="btn-surprise" id="main-btn" onclick="celebrate(event)">
                افتحي هديتك ✨
            </button>

            <div id="message-box" class="message-box">
                <div class="dua-card" id="dua-text"></div>
                <div class="sweet-text" id="sweet-word"></div>
            </div>
        </div>
    </div>

    <script>
        const now = new Date();
        const ramadanStart = new Date('2026-02-18'); 
        const day = Math.floor((now - ramadanStart) / (1000 * 60 * 60 * 24)) + 1;

        if(day > 0 && day <= 30) {
            document.getElementById('ramadan-status').innerText = `نحن اليوم في ${day} رمضان ✨`;
        }

        function celebrate(e) {
            const elements = ['🌸', '🌹', '🌺', '🌷', '🦋', '✨', '💖', '🌼'];
            for (let i = 0; i < 70; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = elements[Math.floor(Math.random() * elements.length)];
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 600 + 100; 
                p.style.setProperty('--tx', `${Math.cos(angle) * distance}px`);
                p.style.setProperty('--ty', `${Math.sin(angle) * distance}px`);
                p.style.setProperty('--tr', `${Math.random() * 720}deg`);
                p.style.left = (e ? e.clientX : window.innerWidth/2) + 'px';
                p.style.top = (e ? e.clientY : window.innerHeight/2) + 'px';
                p.style.fontSize = (Math.random() * 30 + 20) + 'px';
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 2500);
            }
            showContent();
        }

        function showContent() {
            const box = document.getElementById('message-box');
            const dua = document.getElementById('dua-text');
            const word = document.getElementById('sweet-word');
            const wrapper = document.getElementById('wrapper');
            const btn = document.getElementById('main-btn');

            if (day < 3) {
                box.style.display = 'block';
                dua.innerText = "صبر جميل يا سندس..";
                word.innerText = "الرسائل ستبدأ في 3 رمضان، خليكِ جاهزة للمفاجآت!";
            } 
            else if (day >= 3 && day < 30) {
                box.style.display = 'block';
                const data = getDailyData(day);
                dua.innerHTML = `🤲 <b>دعوة لكِ اليوم:</b><br>${data.dua}`;
                word.innerHTML = `💌 <b>كلمة لسندس:</b><br>${data.word}`;
            } 
            else {
                btn.style.display = 'none';
                wrapper.innerHTML = `
                    <h1 style="font-size: 2.2rem; margin-bottom: 20px;">ليلة العيد يا سندس! 🦋</h1>
                    <div class="eid-text-scroll">
                        يا ألطف إنسانة عرفتها في حياتي.. <br><br>
                        اليوم ونحن نودع رمضان، أردت أن تكون رسالتي لكِ مختلفة جداً، تماماً كاختلافكِ عن الآخرين. 
                        أنتِ لستِ مجرد صديقة مرّت في أيامي، أنتِ الشخص الذي جعل لكل يوم ميزة، ولكل دعاء اسماً. 
                        <br><br>
                        بصفتي مبرمج (YAHYA.EXE.V1)، دائماً أبحث عن "الكمال" في الكود، لكنني وجدته في روحكِ الرقيقة. 
                        أنتِ "الخوارزمية" الوحيدة التي لا يمكن تقليدها، والجمال الذي لا يحتاج لتعديل. 
                        <br><br>
                        أريدكِ أن تعرفي أنكِ أجمل حدا شافتو عيوني، وألطف قلب تعاملت معو. 
                        ضحكتكِ يا سندس هي العيد الحقيقي بالنسبة لي، وهي اللي بتخلي كل شي صعب يمر بسلام. 
                        <br><br>
                        شكراً لأنكِ كنتِ معي طوال هذا الشهر، شكراً لأنكِ سندس التي لا تتغير مهما تغيرت الظروف. 
                        أتمنى لكِ في ليلة العيد هذه أن تمتلئ حياتكِ بالفرح، وأن تظلي دائماً بتلك الرقة والجمال.
                        <br><br>
                        <b>كل عام وأنتِ عيدي، وكل عام وأنتِ بمليار خير يا أغلى سندس.. ❤️✨</b>
                        <br><br>
                        <span style="font-size: 0.9rem; color: #888;">--- من مبرمجك المخلص (YAHYA.EXE.V1)</span>
                    </div>
                `;
                setInterval(() => celebrate(null), 3000);
            }
        }

        function getDailyData(d) {
            const data = {
                3: { dua: "اللهم اجعل يوم سندس مليئاً بالبشائر والرضا.", word: "بدايتنا هنا.. أنتِ كالفراشة التي تزيد المكان بهجة." },
                4: { dua: "يا رب احفظ لها ابتسامتها التي تضيء عالمي.", word: "رقتكِ يا سندس تغلب أرق أنواع الورد في عز تفتحه." },
                5: { dua: "اللهم افتح لها أبواب الخير والتوفيق في كل خطوة.", word: "أنتِ الشخص الذي لا يتكرر مرتين، كود فريد لا مثيل له." },
                6: { dua: "اللهم ارزقها سكينة القلب وطمأنينة الروح.", word: "ضحكتكِ هي 'الموسيقى' التي تعدل مزاج يومي." },
                7: { dua: "يا رب اجعل لسندس نصيباً من كل فرحة تسكن قلبها.", word: "أنتِ كالغيمة اللطيفة التي تمطر حباً أينما حلت." },
                8: { dua: "اللهم جمل مستقبلها واجعله أجمل مما تتمنى.", word: "سندس.. اسمكِ وحده يكفي ليزهر قلبي وردًا." },
                9: { dua: "يا رب اكتب لها النجاح في كل أمر تسعى إليه.", word: "أنتِ المعنى الحقيقي لكلمة 'لطافة' في هذا العالم." },
                10: { dua: "اللهم بارك لها في عشرها الأوائل واقبل طاعتها.", word: "وجودكِ يا سندس يجعل أيامي أكثر إشراقاً وجمالاً." },
                11: { dua: "اللهم أرح قلبها بذكرك وطاعتك.", word: "لكِ في قلبي مقامٌ لا يصله أحد، يا أرقى سندس." },
                12: { dua: "يا رب ارزقها سعادة لا تشقى بعدها أبداً.", word: "كلما نظرت لضحكتكِ، أدركت أن العالم لا يزال بخير." },
                13: { dua: "اللهم احمِ قلبها من ضيق الدنيا.", word: "أنتِ الرفيقة التي تشبه نسمة الفجر الباردة." },
                14: { dua: "يا رب اجبر خاطرها وحقق مرادها.", word: "رؤية اسمكِ في يومي تغير كود مزاجي للأفضل." },
                15: { dua: "اللهم اجعلها ممن نالوا شرف استجابة الدعاء.", word: "نصف الشهر مرّ، وأنتِ لا تزالين أجمل ما فيه." },
                16: { dua: "يا رب نور دربها بالإيمان واليقين.", word: "يا سندس، أنتِ نادرة كالتحف التي لا تقدر بثمن." },
                17: { dua: "اللهم عطر أيامها برياحين الجنة.", word: "أنتِ الشخص الذي يثبت لي دائماً أن الجمال يبدأ من الداخل." },
                18: { dua: "يا رب أعطها أكثر مما تتمنى في الدنيا والآخرة.", word: "لطافتكِ هي الخيط الذي يربط قلبي بالسعادة." },
                19: { dua: "اللهم اجعل أيامها القادمة مغلفة بالرضا.", word: "يا سندس، أنتِ كالنجمة التي لا يطفئ نورها أحد." },
                20: { dua: "يا رب بارك لها في عمرها وصحتها وجمال قلبها.", word: "بدأنا في العشر الأواخر، ودعواتي لكِ تزداد حباً." },
                21: { dua: "اللهم إنها ليلة من ليالي العشر، فاجعل لها فيها دعوة لا تُرد.", word: "أنتِ الهدية التي أرسلها القدر لتجمل حياتي." },
                22: { dua: "يا رب اجعلها من عتقائك من النار في هذا الشهر.", word: "يا سندس، قلبكِ أبيض كالياسمين وروحكِ رقيقة كالحرير." },
                23: { dua: "اللهم ارزقها ليلة القدر وبشرها بما يسعدها.", word: "أنتِ الملاذ الدافئ في وسط هذه الأيام المزدحمة." },
                24: { dua: "يا رب اكتب لها توفيقاً دائماً في كل خطوة.", word: "ضحكتكِ يا سندس هي 'تحديث' السعادة الذي أحتاجه يومياً." },
                25: { dua: "اللهم أسعدها سعادة الدارين.", word: "أنتِ لستِ فقط صديقة، أنتِ روحٌ لا أريد فقدانها." },
                26: { dua: "يا رب ارفع قدرها وأصلح بالها.", word: "يا سندس، أنتِ تفصيل جميل في حكاية عمري." },
                27: { dua: "اللهم تقبل منا ومنها صالح الأعمال.", word: "يا أجمل ختام لأيامي، أنتِ العيد قبل العيد." },
                28: { dua: "يا رب لا تخرج رمضان إلا وقد غفرت لها كل ذنب.", word: "اسمكِ محفور في قلبي كما يُحفظ أهم كود في برنامجي." },
                29: { dua: "اللهم ارزقها فرحة تسجد لها باكية.", word: "سندس.. أنتِ أغلى ما أملك في هذا الشهر الكريم." }
            };
            return data[d] || { 
                dua: "اللهم يسر أمرها واشرح صدرها وبارك لها في عمرها.", 
                word: "يا سندس، أنتِ قطعة السكر التي تحلي أيامنا المرّة." 
            };
        }
    </script>
</body>
</html>
